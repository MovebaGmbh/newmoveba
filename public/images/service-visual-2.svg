<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18181B" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#18181B" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- minimal room / furniture shapes -->
  <g>
    <rect x="190" y="260" width="820" height="420" rx="40" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="6"/>
    <rect x="250" y="520" width="420" height="120" rx="28" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="6"/>
    <rect x="720" y="460" width="220" height="180" rx="28" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="6"/>
    <path d="M250 610h420" stroke="#E4E4E7" stroke-width="6"/>
    <path d="M720 550h220" stroke="#E4E4E7" stroke-width="6"/>
  </g>

  <!-- tool-ish strokes (assembly) -->
  <g stroke="#18181B" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M330 360l120 120"/>
    <path d="M410 340l40 40"/>
    <path d="M860 340l-90 90"/>
  </g>

  <!-- subtle depth overlay -->
  <rect x="140" y="140" width="920" height="620" rx="44" fill="url(#shadow)"/>
</svg>
